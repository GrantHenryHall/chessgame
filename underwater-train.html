<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Underwater Train</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    svg {
      width: min(900px, 100vw);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ocean gradient background -->
    <linearGradient id="oceanBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a3a"/>
      <stop offset="40%" stop-color="#002d5c"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>

    <!-- Light beam gradient -->
    <radialGradient id="lightBeam" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#7dd4fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7dd4fc" stop-opacity="0"/>
    </radialGradient>

    <!-- Train window glow -->
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffd54f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
    </radialGradient>

    <!-- Headlight glow -->
    <radialGradient id="headlightGlow" cx="100%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#fffde7" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fff176" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd54f" stop-opacity="0"/>
    </radialGradient>

    <!-- Sand gradient -->
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#5c4000"/>
    </linearGradient>

    <!-- Bubble filter -->
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip path for scene -->
    <clipPath id="sceneClip">
      <rect width="900" height="500"/>
    </clipPath>

    <!-- Track rail pattern -->
    <pattern id="trackTies" x="0" y="0" width="40" height="14" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="36" height="10" rx="2" fill="#3a2800" opacity="0.9"/>
    </pattern>
  </defs>

  <g clip-path="url(#sceneClip)">

    <!-- ── BACKGROUND ── -->
    <rect width="900" height="500" fill="url(#oceanBg)"/>

    <!-- Caustic light ripples from surface -->
    <g opacity="0.07">
      <ellipse cx="200" cy="60" rx="180" ry="30" fill="none" stroke="#7dd4fc" stroke-width="2">
        <animate attributeName="rx" values="180;220;180" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.07;0.13;0.07" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="600" cy="80" rx="150" ry="25" fill="none" stroke="#7dd4fc" stroke-width="2">
        <animate attributeName="rx" values="150;190;150" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.07;0.12;0.07" dur="5s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="400" cy="40" rx="200" ry="20" fill="none" stroke="#90caf9" stroke-width="1.5">
        <animate attributeName="rx" values="200;240;200" dur="6s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- Volumetric light shafts -->
    <g opacity="0.5">
      <polygon points="120,0 180,0 260,500 60,500" fill="url(#lightBeam)">
        <animate attributeName="opacity" values="0.5;0.7;0.4;0.6;0.5" dur="7s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="400,0 450,0 520,500 330,500" fill="url(#lightBeam)">
        <animate attributeName="opacity" values="0.4;0.6;0.5;0.3;0.4" dur="9s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="700,0 740,0 800,500 650,500" fill="url(#lightBeam)">
        <animate attributeName="opacity" values="0.6;0.4;0.7;0.5;0.6" dur="8s" repeatCount="indefinite"/>
      </polygon>
    </g>

    <!-- Distant fish silhouettes (background) -->
    <g opacity="0.25" fill="#1a4a7a">
      <!-- fish 1 -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="-60,0; 960,0; -60,0" dur="22s" repeatCount="indefinite"/>
        <ellipse cx="820" cy="120" rx="18" ry="7"/>
        <polygon points="838,120 852,113 852,127"/>
      </g>
      <!-- fish 2 -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="960,0; -60,0; 960,0" dur="18s" repeatCount="indefinite"/>
        <ellipse cx="120" cy="160" rx="14" ry="5"/>
        <polygon points="106,160 94,155 94,165"/>
      </g>
      <!-- fish 3 -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="-60,0; 960,0; -60,0" dur="30s" repeatCount="indefinite"/>
        <ellipse cx="500" cy="80" rx="10" ry="4"/>
        <polygon points="510,80 520,76 520,84"/>
      </g>
    </g>

    <!-- ── SEAFLOOR ── -->
    <!-- Sand base -->
    <rect x="0" y="440" width="900" height="60" fill="url(#sandGrad)"/>
    <!-- Sand ripples -->
    <g stroke="#c8960c" stroke-width="1" fill="none" opacity="0.4">
      <path d="M0,448 Q45,444 90,448 Q135,452 180,448 Q225,444 270,448 Q315,452 360,448 Q405,444 450,448 Q495,452 540,448 Q585,444 630,448 Q675,452 720,448 Q765,444 810,448 Q855,452 900,448"/>
      <path d="M0,456 Q45,452 90,456 Q135,460 180,456 Q225,452 270,456 Q315,460 360,456 Q405,452 450,456 Q495,460 540,456 Q585,452 630,456 Q675,460 720,456 Q765,452 810,456 Q855,460 900,456"/>
    </g>

    <!-- Coral / seaweed decorations -->
    <!-- Coral left -->
    <g transform="translate(60,440)" filter="url(#glow)">
      <line x1="0" y1="0" x2="-8" y2="-50" stroke="#e91e8c" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="5" y2="-60" stroke="#e91e8c" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="15" y2="-40" stroke="#ad1457" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-8" cy="-50" r="5" fill="#f48fb1"/>
      <circle cx="5" cy="-60" r="6" fill="#f06292"/>
      <circle cx="15" cy="-40" r="5" fill="#e91e8c"/>
    </g>

    <!-- Seaweed right -->
    <g transform="translate(840,440)">
      <path d="M0,0 Q-10,-20 0,-40 Q10,-60 0,-80" stroke="#2e7d32" stroke-width="4" fill="none" stroke-linecap="round">
        <animate attributeName="d" values="M0,0 Q-10,-20 0,-40 Q10,-60 0,-80;M0,0 Q10,-20 0,-40 Q-10,-60 0,-80;M0,0 Q-10,-20 0,-40 Q10,-60 0,-80" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M5,0 Q15,-15 5,-35 Q-5,-55 5,-75" stroke="#388e3c" stroke-width="3" fill="none" stroke-linecap="round">
        <animate attributeName="d" values="M5,0 Q15,-15 5,-35 Q-5,-55 5,-75;M5,0 Q-5,-15 5,-35 Q15,-55 5,-75;M5,0 Q15,-15 5,-35 Q-5,-55 5,-75" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Coral right -->
    <g transform="translate(820,440)" filter="url(#glow)">
      <line x1="0" y1="0" x2="-5" y2="-45" stroke="#ff6f00" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="8" y2="-55" stroke="#ff8f00" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-5" cy="-45" r="6" fill="#ffab40"/>
      <circle cx="8" cy="-55" r="5" fill="#ffa000"/>
    </g>

    <!-- Rocks on seafloor -->
    <ellipse cx="150" cy="448" rx="28" ry="12" fill="#2a3a2a" opacity="0.7"/>
    <ellipse cx="160" cy="445" rx="18" ry="10" fill="#3a4a3a" opacity="0.6"/>
    <ellipse cx="700" cy="450" rx="22" ry="10" fill="#2a3a2a" opacity="0.7"/>
    <ellipse cx="710" cy="447" rx="14" ry="8" fill="#3a4a3a" opacity="0.6"/>

    <!-- ── TRAIN TRACK ── -->
    <g transform="translate(0, 400)">
      <!-- Rail ties (background rect with pattern) -->
      <rect x="0" y="18" width="900" height="14" fill="url(#trackTies)" opacity="0.85"/>
      <!-- Left rail -->
      <rect x="0" y="14" width="900" height="5" rx="2" fill="#8a7050" opacity="0.9"/>
      <!-- Right rail -->
      <rect x="0" y="30" width="900" height="5" rx="2" fill="#8a7050" opacity="0.9"/>
    </g>

    <!-- ── TRAIN (animated moving right-to-left then looping) ── -->
    <g id="train">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -1350,0" dur="12s" repeatCount="indefinite"/>

      <!-- === LOCOMOTIVE === -->
      <g transform="translate(1200, 270)">

        <!-- Headlight beam (cone of light in front) -->
        <polygon points="0,35 -220,10 -220,60" fill="url(#headlightGlow)" opacity="0.4" filter="url(#blur1)"/>

        <!-- Locomotive body -->
        <rect x="-10" y="20" width="220" height="110" rx="12" fill="#1a2a6c"/>
        <!-- Top curved roof -->
        <path d="M-10,20 Q100,0 210,20" fill="#1e3380" stroke="#0d1a50" stroke-width="1"/>
        <!-- Bottom skirt -->
        <rect x="-10" y="118" width="220" height="15" rx="4" fill="#0d1a50"/>

        <!-- Nose / front cowling -->
        <path d="M210,20 Q240,30 245,75 Q240,120 210,130" fill="#1a2a6c" stroke="#0d1a50" stroke-width="1"/>
        <!-- Front glass panel -->
        <path d="M212,32 Q235,40 238,75 Q235,110 212,118" fill="#0a1a40" stroke="#2a4ab0" stroke-width="1.5"/>
        <!-- Windshield reflection -->
        <path d="M215,38 Q228,45 230,65" stroke="#4a6ad0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

        <!-- Headlight -->
        <circle cx="238" cy="75" r="9" fill="#fffde7" filter="url(#softglow)"/>
        <circle cx="238" cy="75" r="6" fill="white"/>
        <circle cx="238" cy="75" r="3" fill="#fff9c4"/>

        <!-- Windows row -->
        <!-- Win 1 -->
        <rect x="170" y="35" width="30" height="22" rx="4" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="172" y="37" width="26" height="18" rx="3" fill="#fffde7" opacity="0.9"/>
        <!-- Win 2 -->
        <rect x="128" y="35" width="30" height="22" rx="4" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="130" y="37" width="26" height="18" rx="3" fill="#fffde7" opacity="0.85"/>
        <!-- Win 3 -->
        <rect x="86" y="35" width="30" height="22" rx="4" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="88" y="37" width="26" height="18" rx="3" fill="#fffde7" opacity="0.9"/>

        <!-- Stripe along body -->
        <rect x="-10" y="82" width="220" height="6" fill="#3a5fc8" opacity="0.7"/>

        <!-- Wheels -->
        <circle cx="40" cy="133" r="16" fill="#0a0f2a" stroke="#3a5fc8" stroke-width="3"/>
        <circle cx="40" cy="133" r="8" fill="#1a2a6c" stroke="#3a5fc8" stroke-width="1.5"/>
        <circle cx="40" cy="133" r="3" fill="#5a8aff"/>
        <animateTransform attributeName="transform" type="rotate"
          values="0,40,133; 360,40,133" dur="1.2s" repeatCount="indefinite" additive="sum"/>

        <circle cx="100" cy="133" r="16" fill="#0a0f2a" stroke="#3a5fc8" stroke-width="3"/>
        <circle cx="100" cy="133" r="8" fill="#1a2a6c" stroke="#3a5fc8" stroke-width="1.5"/>
        <circle cx="100" cy="133" r="3" fill="#5a8aff"/>

        <circle cx="170" cy="133" r="16" fill="#0a0f2a" stroke="#3a5fc8" stroke-width="3"/>
        <circle cx="170" cy="133" r="8" fill="#1a2a6c" stroke="#3a5fc8" stroke-width="1.5"/>
        <circle cx="170" cy="133" r="3" fill="#5a8aff"/>

        <!-- Coupler -->
        <rect x="-26" y="70" width="20" height="10" rx="3" fill="#3a4a8c"/>
        <rect x="-30" y="73" width="8" height="4" rx="2" fill="#5a6aac"/>

        <!-- Bubbles from locomotive (exhaust-style) -->
        <g fill="none" stroke="#7dd4fc" stroke-width="1.5" opacity="0.7">
          <circle cx="-5" cy="15" r="5">
            <animate attributeName="cy" values="15;-30" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.7;0" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="r" values="5;9" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="10" cy="10" r="4">
            <animate attributeName="cy" values="10;-40" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.7;0" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
            <animate attributeName="r" values="4;8" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
          </circle>
          <circle cx="-15" cy="12" r="3">
            <animate attributeName="cy" values="12;-25" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.7;0" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
            <animate attributeName="r" values="3;6" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
          </circle>
        </g>
      </g>

      <!-- === CAR 1 === -->
      <g transform="translate(870, 270)">
        <!-- Body -->
        <rect x="0" y="20" width="290" height="110" rx="10" fill="#1e3a8a"/>
        <path d="M0,20 Q145,3 290,20" fill="#243d94" stroke="#132d6e" stroke-width="1"/>
        <rect x="0" y="118" width="290" height="15" rx="4" fill="#132d6e"/>
        <!-- Stripe -->
        <rect x="0" y="82" width="290" height="6" fill="#4a70d8" opacity="0.7"/>
        <!-- Windows -->
        <rect x="20" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="22" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.88"/>
        <rect x="74" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="76" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.9"/>
        <rect x="128" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="130" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.85"/>
        <rect x="182" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="184" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.9"/>
        <rect x="236" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="238" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.88"/>
        <!-- Wheels -->
        <circle cx="50" cy="133" r="16" fill="#0a0f2a" stroke="#4a70d8" stroke-width="3"/>
        <circle cx="50" cy="133" r="8" fill="#1e3a8a" stroke="#4a70d8" stroke-width="1.5"/>
        <circle cx="50" cy="133" r="3" fill="#5a8aff"/>
        <circle cx="140" cy="133" r="16" fill="#0a0f2a" stroke="#4a70d8" stroke-width="3"/>
        <circle cx="140" cy="133" r="8" fill="#1e3a8a" stroke="#4a70d8" stroke-width="1.5"/>
        <circle cx="140" cy="133" r="3" fill="#5a8aff"/>
        <circle cx="240" cy="133" r="16" fill="#0a0f2a" stroke="#4a70d8" stroke-width="3"/>
        <circle cx="240" cy="133" r="8" fill="#1e3a8a" stroke="#4a70d8" stroke-width="1.5"/>
        <circle cx="240" cy="133" r="3" fill="#5a8aff"/>
        <!-- Couplers -->
        <rect x="-16" y="70" width="20" height="10" rx="3" fill="#3a4a8c"/>
        <rect x="286" y="70" width="20" height="10" rx="3" fill="#3a4a8c"/>
      </g>

      <!-- === CAR 2 === -->
      <g transform="translate(540, 270)">
        <!-- Body -->
        <rect x="0" y="20" width="290" height="110" rx="10" fill="#1a3070"/>
        <path d="M0,20 Q145,3 290,20" fill="#203480" stroke="#102060" stroke-width="1"/>
        <rect x="0" y="118" width="290" height="15" rx="4" fill="#102060"/>
        <!-- Stripe -->
        <rect x="0" y="82" width="290" height="6" fill="#3a5abf" opacity="0.7"/>
        <!-- Windows -->
        <rect x="20" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="22" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.9"/>
        <rect x="74" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="76" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.85"/>
        <rect x="128" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="130" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.88"/>
        <rect x="182" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="184" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.9"/>
        <rect x="236" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="238" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.88"/>
        <!-- Wheels -->
        <circle cx="50" cy="133" r="16" fill="#0a0f2a" stroke="#3a5abf" stroke-width="3"/>
        <circle cx="50" cy="133" r="8" fill="#1a3070" stroke="#3a5abf" stroke-width="1.5"/>
        <circle cx="50" cy="133" r="3" fill="#5a8aff"/>
        <circle cx="140" cy="133" r="16" fill="#0a0f2a" stroke="#3a5abf" stroke-width="3"/>
        <circle cx="140" cy="133" r="8" fill="#1a3070" stroke="#3a5abf" stroke-width="1.5"/>
        <circle cx="140" cy="133" r="3" fill="#5a8aff"/>
        <circle cx="240" cy="133" r="16" fill="#0a0f2a" stroke="#3a5abf" stroke-width="3"/>
        <circle cx="240" cy="133" r="8" fill="#1a3070" stroke="#3a5abf" stroke-width="1.5"/>
        <circle cx="240" cy="133" r="3" fill="#5a8aff"/>
        <!-- Couplers -->
        <rect x="-16" y="70" width="20" height="10" rx="3" fill="#3a4a8c"/>
        <rect x="286" y="70" width="20" height="10" rx="3" fill="#3a4a8c"/>
      </g>

      <!-- === CABOOSE === -->
      <g transform="translate(310, 270)">
        <!-- Body -->
        <rect x="0" y="20" width="200" height="110" rx="10" fill="#7b1e1e"/>
        <path d="M0,20 Q100,3 200,20" fill="#8c2222" stroke="#5a1010" stroke-width="1"/>
        <rect x="0" y="118" width="200" height="15" rx="4" fill="#5a1010"/>
        <!-- Cupola (raised observation section on top) -->
        <rect x="60" y="0" width="80" height="28" rx="6" fill="#8c2222" stroke="#5a1010" stroke-width="1"/>
        <!-- Cupola windows -->
        <rect x="68" y="5" width="18" height="14" rx="3" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="70" y="7" width="14" height="10" rx="2" fill="#fffde7" opacity="0.9"/>
        <rect x="114" y="5" width="18" height="14" rx="3" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="116" y="7" width="14" height="10" rx="2" fill="#fffde7" opacity="0.9"/>
        <!-- Stripe -->
        <rect x="0" y="82" width="200" height="6" fill="#c0392b" opacity="0.7"/>
        <!-- Windows -->
        <rect x="20" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="22" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.9"/>
        <rect x="144" y="35" width="36" height="24" rx="5" fill="url(#windowGlow)" filter="url(#glow)"/>
        <rect x="146" y="37" width="32" height="20" rx="4" fill="#fffde7" opacity="0.9"/>
        <!-- Rear light -->
        <circle cx="5" cy="75" r="7" fill="#ff4444" filter="url(#softglow)"/>
        <circle cx="5" cy="75" r="4" fill="#ff8888"/>
        <!-- Wheels -->
        <circle cx="45" cy="133" r="16" fill="#0a0f2a" stroke="#c0392b" stroke-width="3"/>
        <circle cx="45" cy="133" r="8" fill="#7b1e1e" stroke="#c0392b" stroke-width="1.5"/>
        <circle cx="45" cy="133" r="3" fill="#ff6a6a"/>
        <circle cx="155" cy="133" r="16" fill="#0a0f2a" stroke="#c0392b" stroke-width="3"/>
        <circle cx="155" cy="133" r="8" fill="#7b1e1e" stroke="#c0392b" stroke-width="1.5"/>
        <circle cx="155" cy="133" r="3" fill="#ff6a6a"/>
        <!-- Coupler front -->
        <rect x="196" y="70" width="20" height="10" rx="3" fill="#8c2222"/>
      </g>

    </g><!-- end #train -->

    <!-- ── FOREGROUND BUBBLES (floating up) ── -->
    <g fill="none" opacity="0.6">
      <!-- Series of bubbles at various positions -->
      <circle cx="80" cy="350" r="5" stroke="#7dd4fc" stroke-width="1.5">
        <animate attributeName="cy" values="350;-20" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="6s" repeatCount="indefinite"/>
